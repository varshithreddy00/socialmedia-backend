# =============================================
# Application Config
# =============================================
spring.application.name=social-media-api
server.port=${PORT:8080}
server.servlet.context-path=/api

# =============================================
# Database Config (PostgreSQL for Render)
# =============================================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================================
# JPA / Hibernate Config
# =============================================
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# =============================================
# JWT Config
# =============================================
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION:86400000}

# =============================================
# Pagination Defaults
# =============================================
app.pagination.default-page=0
app.pagination.default-size=10
app.pagination.max-size=50

# =============================================
# Swagger / OpenAPI
# =============================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# =============================================
# Logging
# =============================================
logging.level.com.socialmedia=INFO
logging.level.org.springframework.security=INFO

# =============================================
# File Upload
# =============================================
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
server.tomcat.max-http-form-post-size=-1
server.tomcat.max-swallow-size=-1