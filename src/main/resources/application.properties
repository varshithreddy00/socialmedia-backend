# =============================================
# Application Config
# =============================================
spring.application.name=social-media-api
server.port=8080
server.servlet.context-path=/api

# =============================================
# Database Config
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/socialmedia_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Rahul@2005
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# JPA / Hibernate Config
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# =============================================
# JWT Config
# =============================================
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration-ms=86400000

# =============================================
# Pagination Defaults
# =============================================
app.pagination.default-page=0
app.pagination.default-size=10
app.pagination.max-size=50

# =============================================
# Swagger / OpenAPI
# =============================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# =============================================
# Logging
# =============================================
logging.level.com.socialmedia=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
server.tomcat.max-http-form-post-size=-1
server.tomcat.max-swallow-size=-1